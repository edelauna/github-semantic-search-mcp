name: default

on:
  pull_request:
    branches: [ dev ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'workflow/package-lock.json'

    - name: Install dependencies
      working-directory: workflow
      run: npm ci

    - name: Run tests
      working-directory: workflow
      run: npm test
